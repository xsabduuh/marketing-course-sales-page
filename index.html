<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دورة التسويق الرقمي — MARKETER PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Righteous&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f3ee;
  --bg2:#eeeae0;
  --white:#ffffff;
  --ink:#1a1208;
  --ink2:#3d3420;
  --gray:#8a8070;
  --coral:#f4522a;
  --coral2:#ff6b46;
  --indigo:#4338ca;
  --indigo2:#6366f1;
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --mint:#059669;
  --mint2:#10b981;
  --rose:#e11d48;
  --sky:#0284c7;
  --sky2:#38bdf8;
  --purple:#7c3aed;
  --purple2:#a78bfa;
  --border:rgba(26,18,8,.09);
  --sh:0 4px 24px rgba(26,18,8,.09);
  --sh-lg:0 12px 48px rgba(26,18,8,.13);
  
  /* ألوان جديدة للأيقونات في الوضع النهاري */
  --icon-color: #1a1208;           /* داكن رئيسي */
  --icon-color2: #3d3420;          /* داكن ثانوي */
  --icon-light: #555;              /* للأيقونات الخفيفة */
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}

/* تحسين الأيقونات العام */
.icon-dark {
  filter: brightness(0) invert(0) !important;   /* أسود داكن */
}

/* أيقونات ملونة خفيفة تحتاج تباين أعلى */
.icon-accent {
  filter: brightness(0.85) saturate(1.1) !important;
}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:300;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;transition:all .4s}
nav.scrolled{background:rgba(246,243,238,.94);backdrop-filter:blur(22px);box-shadow:0 2px 28px rgba(26,18,8,.07);padding:11px 24px}

.nav-logo{font-family:'Righteous',cursive;font-size:19px;color:var(--coral);display:flex;align-items:center;gap:7px}
.ndot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--amber));animation:pp 2s infinite}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

.nav-r{display:flex;align-items:center;gap:10px}
.npill{display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:99px;padding:7px 14px;font-size:11px;font-weight:700;color:var(--ink2);text-decoration:none;transition:all .25s;box-shadow:var(--sh)}
.npill img{width:15px;height:15px}
.npill:hover{border-color:var(--coral);color:var(--coral);transform:translateY(-1px)}

.ncta{background:var(--coral);color:#fff;border:none;padding:11px 22px;border-radius:99px;font-size:12px;font-weight:800;cursor:pointer;transition:all .3s;box-shadow:0 5px 18px rgba(244,82,42,.32);letter-spacing:.3px}
.ncta:hover{background:var(--coral2);transform:translateY(-2px);box-shadow:0 9px 26px rgba(244,82,42,.44)}

/* ── HERO ICONS ── */
.hico{display:flex;align-items:center;gap:7px;background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:9px 13px;transition:all .3s;box-shadow:var(--sh)}
.hico img{width:20px;height:20px;object-fit:contain;filter:brightness(0) invert(0); /* أسود داكن */}
.hico span{font-size:10px;font-weight:700;color:var(--ink2)}

.hico:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}

/* Benefits Icons */
.bIco img{
  width:24px;
  height:24px;
  filter: brightness(0) invert(1) !important;   /* أبيض على خلفية ملونة */
}

/* Curriculum Play Icons */
.lPlay img{
  filter: brightness(0) invert(1) !important;
}

/* Price Icons */
.pFIco img{
  filter: brightness(0.15) saturate(0.9) !important;   /* داكن جداً */
}

/* Footer Social */
.fsa img{
  filter: brightness(0) invert(1) !important;
}

/* باقي التحسينات */
.seats-hot img,
.slBtn img,
.wArrow img,
.faqTog,
.starBox img,
.qIco img{
  filter: brightness(0) invert(0.15) !important;
}

.starBox {
  background:var(--amber) !important;
}

/* باقي الـ CSS كما هو (لم أغيره إلا الأجزاء المتعلقة بالأيقونات) */
.hero{min-height:100vh;padding:108px 24px 68px;position:relative;overflow:hidden;background:var(--bg)}
.blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;animation:bf 9s ease-in-out infinite}
.b1{width:480px;height:480px;background:rgba(244,82,42,.11);top:-110px;right:-90px}
.b2{width:360px;height:360px;background:rgba(67,56,202,.08);bottom:-70px;left:-50px;animation-direction:reverse;animation-duration:11s}
.b3{width:240px;height:240px;background:rgba(245,158,11,.09);top:45%;left:28%;animation-duration:7s;animation-delay:2s}
@keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-26px)}}

.htex{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(26,18,8,.06) 1.5px,transparent 1.5px);background-size:26px 26px;pointer-events:none}

.hc{position:relative;z-index:2}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid rgba(244,82,42,.22);border-radius:99px;padding:7px 18px;font-size:10px;font-weight:800;color:var(--coral);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;width:fit-content;box-shadow:0 3px 14px rgba(244,82,42,.1)}

.hh1{font-family:'Righteous',cursive;font-size:clamp(44px,13vw,76px);line-height:.95;letter-spacing:-1px;margin-bottom:18px}
.hh1 .l1{display:block;color:var(--ink)}
.hh1 .l2{display:block;background:linear-gradient(135deg,var(--coral),var(--amber) 50%,var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hh1 .l3{display:block;font-size:.41em;color:var(--gray);letter-spacing:4px;font-weight:300}

.hdesc{font-size:14px;color:var(--gray);line-height:1.9;max-width:370px;margin-bottom:24px;padding-right:15px;border-right:3px solid var(--coral)}

.seats{background:var(--white);border-radius:15px;padding:14px 17px;margin-bottom:24px;border:1.5px solid var(--border);box-shadow:var(--sh)}
.seats-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px}
.seats-hot{color:var(--rose);font-weight:800;display:flex;align-items:center;gap:4px}
.seats-count{color:var(--gray)}
.seats-bar{height:7px;background:#ede9e1;border-radius:99px;overflow:hidden}
.seats-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--coral),var(--amber));animation:bg 1.8s 1s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes bg{to{width:68%}}

.hstats{display:flex;gap:0;margin-bottom:28px}
.hs{flex:1;display:flex;flex-direction:column;gap:2px;border-left:1px solid var(--border);padding:0 16px}
.hs:first-child{border:none;padding-right:0}
.hs-n{font-family:'Righteous',cursive;font-size:27px;background:linear-gradient(135deg,var(--coral),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hs-l{font-size:9px;color:var(--gray);letter-spacing:1px;text-transform:uppercase}

.hbtns{display:flex;gap:10px}
.bmain{flex:1;background:linear-gradient(135deg,var(--coral),var(--rose));color:#fff;border:none;padding:17px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 26px rgba(244,82,42,.36);transition:all .3s;position:relative;overflow:hidden}
.bmain:hover{transform:translateY(-3px);box-shadow:0 13px 36px rgba(244,82,42,.48)}
.bout{background:transparent;color:var(--ink);border:2px solid rgba(26,18,8,.14);padding:17px 20px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}
.bout:hover{border-color:var(--coral);color:var(--coral)}

/* باقي الـ sections (Benefits, Curriculum, Price, etc.) تبقى كما هي مع التحسينات أعلاه */
.benSec{padding:68px 24px;background:var(--white)}
.bGrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.bCard{background:var(--bg);border-radius:18px;padding:18px 15px;border:1.5px solid transparent;transition:all .35s;cursor:default;position:relative;overflow:hidden}
.bCard:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}
.bIco{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;box-shadow:0 5px 16px rgba(0,0,0,.14)}
.bTitle{font-size:13px;font-weight:800;margin-bottom:4px;color:var(--ink)}
.bDesc{font-size:11px;color:var(--gray);line-height:1.62}

.wArrow img,
.lPlay img,
.pFIco img {
  filter: brightness(0) invert(0.1) !important;
}

/* Footer */
footer{padding:26px 24px;background:var(--ink);text-align:center}
.fSoc{display:flex;justify-content:center;gap:10px;margin-bottom:13px}
.fsa{width:37px;height:37px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:all .25s;text-decoration:none;border:1.5px solid rgba(255,255,255,.09)}
.fsa:hover{transform:translateY(-3px);opacity:.8}
</style>
</head>
<body>

<!-- باقي الـ HTML كما هو بدون تغيير (فقط الأيقونات أصبحت أوضح) -->

<nav id="nav">
  <div class="nav-logo"><div class="ndot"></div>MARKETER PRO</div>
  <div class="nav-r">
    <a class="npill" href="https://wa.me/212600000000" target="_blank">
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/whatsapp.svg" alt="wa" class="icon-dark">
      واتساب
    </a>
    <button class="ncta" onclick="document.getElementById('enroll').scrollIntoView({behavior:'smooth'})">سجّل الآن</button>
  </div>
</nav>

<!-- Hero Icons -->
<div class="hicons">
  <div class="hico">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/meta.svg" alt="Meta" class="icon-dark">
    <span>Meta Ads</span>
  </div>
  <div class="hico">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/tiktok.svg" alt="TikTok" class="icon-dark">
    <span>تيك توك</span>
  </div>
  <div class="hico">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/openai.svg" alt="AI" class="icon-dark">
    <span>AI تسويق</span>
  </div>
  <div class="hico">
    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/googleanalytics.svg" alt="Analytics" class="icon-dark">
    <span>Analytics</span>
  </div>
</div>

<!-- Benefits Icons -->
<div class="bIco"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/meta.svg" alt="Meta" class="icon-accent"></div>
<div class="bIco"><img src="https://cdn.jsdelivr.net/npm/lucide-static@0.428.0/icons/target.svg" alt="Target"></div>
<!-- ... باقي الأيقونات بنفس الطريقة -->

<!-- Curriculum Play -->
<div class="lPlay"><img src="https://cdn.jsdelivr.net/npm/lucide-static@0.428.0/icons/play.svg" alt="▶" class="icon-dark"></div>

<!-- Price Features -->
<div class="pFIco"><img src="https://cdn.jsdelivr.net/npm/lucide-static@0.428.0/icons/video.svg" alt="video" class="icon-dark"></div>

<!-- Footer Social -->
<a class="fsa" href="https://wa.me/212600000000" target="_blank">
  <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/whatsapp.svg" alt="WA" class="icon-dark">
</a>

<!-- باقي الصفحة كما هي (الـ script والأقسام الأخرى) -->

<script>
/* باقي الـ JavaScript كما هو بدون تغيير */
</script>

</body>
</html>
